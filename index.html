<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AING GPT - V1.6</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/theme-worm.css">
</head>

<body data-theme="dark" style="display:none">
  <script src="/js/auth.js"></script>
  <script src="/js/auth-guard.js"></script>

  <!-- Main logic -->
  <script type="module" src="/js/app.js"></script>

  <!-- Background particles -->
  <div class="particles" id="particles"></div>
  <!-- Top-left history dropdown -->
  <div class="history-dropdown" id="historyDropdown">
    <div style="display:flex;align-items:center;gap:8px">
      <button id="historyDropdownBtn" class="theme-toggle" aria-expanded="false">Obrolan ▾</button>
      <button id="historyTrashBtn" class="theme-toggle history-trash" title="Hapus riwayat obrolan" aria-label="Hapus riwayat obrolan">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
    <div id="historyDropdownList" class="history-dropdown-list" aria-label="Daftar obrolan"></div>
  </div>


  <!-- Right-side navbar (hamburger + panel) -->
  <div class="right-navbar">
    <button id="hamburgerBtn" class="hamburger-btn" aria-label="Open menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <nav id="navPanel" class="nav-panel" aria-hidden="true">
      <div class="nav-header">
          <div style="display:flex;gap:8px;align-items:center">
            <strong>Menu</strong>
          </div>
          <button id="closeNavBtn" class="close-nav" aria-label="Close menu">×</button>
      </div>
        <ul class="nav-list">
        <li>
          <button id="newChatBtn" class="nav-item nav-new-chat" title="New Chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
            <span class="nav-label">+ New Chat</span>
          </button>
        </li>
        <li><button id="apiCheckBtn" class="nav-item" title="API Check"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1a5 5 0 00-5 5v3H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2v-8a2 2 0 00-2-2h-2V6a5 5 0 00-5-5zm-3 8V6a3 3 0 116 0v3H9zM7 19v-6h10v6H7z" /></svg><span class="nav-label">API Check</span></button></li>
        <li><button id="paletteBtn" class="nav-item" title="World Monitor"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12c0 3.87 3.13 7 7 7h7c2.21 0 4-1.79 4-4 0-1.1-.9-2-2-2h-1c-.55 0-1-.45-1-1s.45-1 1-1h1c1.1 0 2-.9 2-2 0-4.42-3.58-8-8-8zm0 2c3.31 0 6 2.69 6 6 0 .55-.45 1-1 1h-1c-1.1 0-2 .9-2 2s.9 2 2 2h1c.55 0 1 .45 1 1 0 1.1-.9 2-2 2h-7c-2.76 0-5-2.24-5-5s2.24-5 5-5z"/></svg><span class="nav-label">World Monitor</span></button></li>
        <li><button id="themeToggle" class="nav-item" title="Toggle Theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg><span class="nav-label">Toggle Theme</span></button></li>
        <li><button id="qrBtn" class="nav-item" title="QR"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3h8v8H3zM5 5v4h4V5zM13 3h8v8h-8zM15 5v4h4V5zM3 13h8v8H3zM5 15v4h4v-4zM11 11h2v2h-2zM17 13h2v2h-2zM11 17h2v2h-2zM17 17h2v2h-2z"/></svg><span class="nav-label">QR</span></button></li>
        <li><button id="shopBtn" class="nav-item" title="Shop"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14h9.66l-1.2-4H8.53L7.16 14zM20 6H6.21l-.94-2H1v2h3l3.6 7.59L6.25 16c-.14.27-.25.57-.25.91 0 1.1.9 2 2 2h12v-2H8.42c-.14 0-.25-.11-.25-.25L8.5 14h8.2c.75 0 1.41-.41 1.75-1.03L22 6c0-.55-.45-1-1-1z"/></svg><span class="nav-label">Shop</span></button></li>
        <li><button id="tempOtpBtn" class="nav-item" title="Temp-OTP"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg><span class="nav-label">Temp-OTP</span></button></li>
        <li><button id="logoutBtn" class="nav-item" title="Logout"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 13v-2H7V8l-5 4 5 4v-3zM20 3h-8v2h8v14h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg><span class="nav-label">Logout</span></button></li>
        <li><button id="clearHistoryBtn" class="nav-item" title="Clear history"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg><span class="nav-label">Clear history</span></button></li>
      </ul>
    </nav>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1 class="main-title">AING GPT</h1>
      <div class="header-portfolio">
        </a>
      </div>
      <p class="subtitle">Tools V1.6</p>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot"></div>
        <span>Status: <strong>Online</strong></span>
        <span>Model Ai: <strong>WORM-GPT</strong></span>
      </div>
      <div class="status-item">
        <span>Memory: <strong>Active</strong></span>
      </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
      <!-- Chat Log -->
      <div class="chat-log" id="chatLog"></div>

      <!-- Typing Indicator -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-animation">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">            <label class="sr-only" for="chatInput">Pesan</label>          <textarea class="chat-input" id="chatInput" placeholder="Apa yang ingin anda tanyakan..." autocomplete="off"
            rows="1"></textarea>
          <div class="input-toolbar">
            <label class="upload-btn" for="fileInput" title="Unggah file (TXT, MD, JSON, DOCX, PDF)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M11 5v6H5v2h6v6h2v-6h6v-2h-6V5h-2z" />
              </svg>
              <span>File</span>
            </label>
            <input id="fileInput" type="file" accept=".txt,.md,.json,.xml,.html,.htm,.csv,.pdf,.docx,.doc" hidden>
            <div id="selectedFileContainer" class="selected-file-container" hidden>
              <span id="selectedFileName" class="selected-file-name"></span>
              <button id="clearSelectedFileBtn" class="clear-file-btn" type="button" aria-label="Batal pilih file" title="Batal pilih file">
                ×
              </button>
            </div>
          </div>
        </div>
        <button class="send-btn" id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Image generation modal -->
  <div id="imageModal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:center;justify-content:center;padding:20px;">
    <div
      style="background:var(--bg-card);border-radius:12px;padding:18px;max-width:720px;width:100%;box-shadow:var(--shadow);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <strong>Generate Image</strong>
        <button id="closeImageModal" class="theme-toggle" style="padding:6px 10px;">Close</button>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
        <label class="sr-only" for="imagePrompt">Prompt gambar</label>
        <input id="imagePrompt" name="imagePrompt"
          placeholder="Tuliskan deskripsi gambar (contoh: pemandangan pegunungan saat matahari terbenam)"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-card-light);color:var(--text-primary);">
        <label class="sr-only" for="imageModel">Model gambar</label>
        <input id="imageModel" name="imageModel" list="modelSuggestions" placeholder="gema-2.5-flash-image (optional)"
          style="width:260px;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-card-light);color:var(--text-primary);">
        <datalist id="modelSuggestions">
          <option value="gema-2.5-flash-image"></option>
          <option value="gema-1.5-image"></option>
          <option value="gpt-image-1"></option>
        </datalist>
        <label class="sr-only" for="imageSize">Ukuran gambar</label>
        <select id="imageSize" name="imageSize"
          style="width:140px;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-card-light);color:var(--text-primary);">
          <option value="512x512">512x512</option>
          <option value="768x768">768x768</option>
          <option value="1024x1024" selected>1024x1024</option>
        </select>
        <button id="generateImageBtn" class="send-btn" style="padding:10px 14px;height:auto;">Generate</button>
      </div>
      <div id="imageProgress" style="margin-bottom:10px;color:var(--text-secondary);display:none;">Generating...</div>
      <div id="imageResults" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">
      </div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification" id="notification">Text copied successfully!</div>

  <script src="/js/image.js"></script>
  <script>
    (function(){
      const hamburger = document.getElementById('hamburgerBtn');
      const nav = document.getElementById('navPanel');
      const closeBtn = document.getElementById('closeNavBtn');

      function openNav(){
        nav.classList.add('open');
        nav.setAttribute('aria-hidden','false');
        hamburger.setAttribute('aria-expanded','true');
      }
      function closeNav(){
        nav.classList.remove('open');
        nav.setAttribute('aria-hidden','true');
        hamburger.setAttribute('aria-expanded','false');
      }

      hamburger.addEventListener('click', ()=>{
        if(nav.classList.contains('open')) closeNav(); else openNav();
      });
      closeBtn.addEventListener('click', closeNav);

      // close when clicking outside
      document.addEventListener('click', (e)=>{
        if(!nav.contains(e.target) && !hamburger.contains(e.target)) closeNav();
      });
      document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeNav(); });

      // Move palette function here so palette button works
      window.hackerThemeLoginAlert = function(){
        alert('FITUR BETA WORLD MONITOR : UNTUK LANJUT KLIK OKE');
        window.location.href = 'https://world-monitor.app/?utm_source=chatgpt.com';
      }

      // wire quick actions
      const apiBtn = document.getElementById('apiCheckBtn');
      if(apiBtn) apiBtn.addEventListener('click', ()=> window.open('https://apicheck-liart.vercel.app/','_blank','noopener,noreferrer'));
      const qrBtn = document.getElementById('qrBtn');
      if(qrBtn) qrBtn.addEventListener('click', ()=> window.open('https://qr-aing.vercel.app/','_blank','noopener,noreferrer'));
      const tempOtpBtn = document.getElementById('tempOtpBtn');
      if(tempOtpBtn) tempOtpBtn.addEventListener('click', ()=> window.open('https://tempmail-orpin.vercel.app/login.html','_blank','noopener,noreferrer'));
      const paletteBtn = document.getElementById('paletteBtn');
      if(paletteBtn) paletteBtn.addEventListener('click', hackerThemeLoginAlert);
      const shopBtn = document.getElementById('shopBtn');
      if(shopBtn) shopBtn.addEventListener('click', ()=> window.open('https://fearhackshop.vercel.app','_blank','noopener,noreferrer'));

      // close nav when any nav-item clicked (keeps mobile tidy)
      document.querySelectorAll('.nav-item').forEach(item=>{
        item.addEventListener('click', ()=> closeNav());
      });
    })();
  </script>
</body>

</html>
