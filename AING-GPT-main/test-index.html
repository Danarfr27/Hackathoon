<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AING GPT - V1.6</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* 1. Tema Hacker */
    body[data-theme="hacker"] {
      --bg-color: #000000;
      --bg-card: #0a0a0a;
      --bg-card-light: #111111;
      --text-primary: #00ff00;
      --text-secondary: #008800;
      --primary-color: #00ff00;
      --border-color: #003300;
      --shadow: 0 4px 15px rgba(0, 255, 0, 0.15);
      background-image: none;
    }

    /* 2. Tema Clean Minimalis */
    body[data-theme="minimalist"] {
      --bg-color: #f8f9fa;
      --bg-card: #ffffff;
      --bg-card-light: #f1f3f5;
      --text-primary: #212529;
      --text-secondary: #495057;
      --primary-color: #228be6;
      --border-color: #dee2e6;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      background-image: none;
    }

    /* 3. Tema Beauty Pink Cyber */
    body[data-theme="pink-cyber"] {
      --bg-color: #1a0b1c;
      --bg-card: #2d1330;
      --bg-card-light: #3e1942;
      --text-primary: #ff77ff;
      --text-secondary: #f0a3f0;
      --primary-color: #ff00ff;
      --border-color: #8c2a8c;
      --shadow: 0 0 15px rgba(255, 0, 255, 0.3);
      background-image: none;
    }

    /* 4. Tema Anime */
    body[data-theme="anime"] {
      --bg-color: #e2e8f0;
      --bg-card: rgba(255, 255, 255, 0.85);
      --bg-card-light: rgba(255, 255, 255, 0.95);
      --text-primary: #2d3748;
      --text-secondary: #4a5568;
      --primary-color: #667eea;
      --border-color: #cbd5e0;
      --shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
      /* Opsi background anime (bisa dihapus jika hanya ingin warna solid) */
      background-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      backdrop-filter: blur(5px);
    }

    /* 5. Tema Dark Web */
    body[data-theme="dark-web"] {
      --bg-color: #090909;
      --bg-card: #151515;
      --bg-card-light: #1f1f1f;
      --text-primary: #d4d4d4;
      --text-secondary: #8c8c8c;
      --primary-color: #d32f2f;
      --border-color: #3b0d0d;
      --shadow: 0 4px 15px rgba(211, 47, 47, 0.2);
      background-image: none;
    }

    /* Styling Dropdown Tema di Navbar */
    .nav-sub-list {
      list-style: none;
      padding-left: 35px;
      margin-top: 5px;
      display: none; /* Hidden by default */
      flex-direction: column;
      gap: 5px;
    }
    .nav-sub-list.active {
      display: flex;
    }
    .nav-sub-list .theme-btn {
      font-size: 0.85em;
      padding: 8px 12px;
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .nav-sub-list .theme-btn:hover {
      background: var(--bg-card-light);
      color: var(--primary-color);
    }
    .chevron-icon {
      margin-left: auto;
      transition: transform 0.3s;
    }
    #changeThemesBtn[aria-expanded="true"] .chevron-icon {
      transform: rotate(180deg);
    }
  </style>

  <script>
    (function(){
      const hamburger = document.getElementById('hamburgerBtn');
      const nav = document.getElementById('navPanel');
      const closeBtn = document.getElementById('closeNavBtn');

      function openNav(){
        nav.classList.add('open');
        nav.setAttribute('aria-hidden','false');
        hamburger.setAttribute('aria-expanded','true');
      }
      function closeNav(){
        nav.classList.remove('open');
        nav.setAttribute('aria-hidden','true');
        hamburger.setAttribute('aria-expanded','false');
      }

      hamburger.addEventListener('click', ()=>{
        if(nav.classList.contains('open')) closeNav(); else openNav();
      });
      closeBtn.addEventListener('click', closeNav);

      // close when clicking outside
      document.addEventListener('click', (e)=>{
        if(!nav.contains(e.target) && !hamburger.contains(e.target)) closeNav();
      });
      document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeNav(); });

      // Move palette function here so palette button works
      window.hackerThemeLoginAlert = function(){
        alert('FITUR BETA WORLD MONITOR : UNTUK LANJUT KLIK OKE');
        window.location.href = 'https://world-monitor.app/?utm_source=chatgpt.com';
      }

      // wire quick actions
      const apiBtn = document.getElementById('apiCheckBtn');
      if(apiBtn) apiBtn.addEventListener('click', ()=> window.open('https://apicheck-liart.vercel.app/','_blank'));
      const qrBtn = document.getElementById('qrBtn');
      if(qrBtn) qrBtn.addEventListener('click', ()=> window.open('https://qr-aing.vercel.app/','_blank'));
      const tempOtpBtn = document.getElementById('tempOtpBtn');
      if(tempOtpBtn) tempOtpBtn.addEventListener('click', ()=> window.open('https://tempmail-orpin.vercel.app/login.html','_blank'));
      const paletteBtn = document.getElementById('paletteBtn');
      if(paletteBtn) paletteBtn.addEventListener('click', hackerThemeLoginAlert);
      const shopBtn = document.getElementById('shopBtn');
      if(shopBtn) shopBtn.addEventListener('click', ()=> window.open('https://fearhackshop.vercel.app','_blank'));

      // ==========================================
      // LOGIC THEME SWITCHER
      // ==========================================
      const changeThemesBtn = document.getElementById('changeThemesBtn');
      const themeDropdownList = document.getElementById('themeDropdownList');
      const themeBtns = document.querySelectorAll('.theme-btn');

      // Set tema tersimpan saat load
      const savedTheme = localStorage.getItem('aing-gpt-theme');
      if(savedTheme) {
        document.body.setAttribute('data-theme', savedTheme);
      }

      // Handle dropdown open/close
      if(changeThemesBtn && themeDropdownList) {
        changeThemesBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const isExpanded = changeThemesBtn.getAttribute('aria-expanded') === 'true';
          changeThemesBtn.setAttribute('aria-expanded', !isExpanded);
          themeDropdownList.classList.toggle('active');
        });
      }

      // Handle klik sub-tema
      themeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const selectedTheme = btn.getAttribute('data-set-theme');
          document.body.setAttribute('data-theme', selectedTheme);
          localStorage.setItem('aing-gpt-theme', selectedTheme);
          closeNav(); // Otomatis tutup nav panel setelah pilih
        });
      });
      // ==========================================

      // close nav when any nav-item clicked (keeps mobile tidy)
      // Modifikasi: cegah menutup panel saat mengklik tombol dropdown tema
      document.querySelectorAll('.nav-item').forEach(item=>{
        item.addEventListener('click', (e)=> {
          if (item.id === 'changeThemesBtn') return; 
          closeNav();
        });
      });
    })();
  </script>
